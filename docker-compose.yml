version: '3.8'

services:
  backend:
    build: ./backend
    container_name: backend_container
    image: aneree/aneree-backend
    ports:
      - "8000:8000"
    env_file:
      - ./.env

  frontend:
    build: ./frontend
    container_name: frontend_container
    image: aneree/aneree-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  